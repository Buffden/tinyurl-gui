name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Angular
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npx ng build --configuration=production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: dist/tinyurl-gui/browser/
          retention-days: 1

  deploy:
    name: Deploy to S3 + CloudFront
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for OIDC
      contents: read

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-dist
          path: dist/tinyurl-gui/browser/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Fetch parameters from AWS Parameter Store
        run: |
          CF_DIST_ID=$(aws ssm get-parameter \
            --name "/tinyurl/cicd/cf-dist-id" \
            --with-decryption \
            --query "Parameter.Value" --output text)
          echo "CF_DIST_ID<<EOF" >> $GITHUB_ENV
          echo "$CF_DIST_ID" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Upload hashed assets to S3 (long cache)
        run: |
          aws s3 sync dist/tinyurl-gui/browser/ s3://tinyurl-spa-prod/ \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload index.html to S3 (no cache)
        run: |
          aws s3 cp dist/tinyurl-gui/browser/index.html s3://tinyurl-spa-prod/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "$CF_DIST_ID" \
            --paths "/*" \
            --query "Invalidation.Id" \
            --output text)

          echo "Waiting for invalidation $INVALIDATION_ID to complete..."

          aws cloudfront wait invalidation-completed \
            --distribution-id "$CF_DIST_ID" \
            --id "$INVALIDATION_ID"

          echo "CloudFront cache cleared — deployment complete"

      - name: Smoke test
        run: |
          sleep 5
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://tinyurl.buffden.com)
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed — https://tinyurl.buffden.com returned HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed — HTTP $STATUS"
